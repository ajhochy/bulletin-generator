version: "3"

services:
  worship-booklet:
    image: ghcr.io/ajhochy/bulletin-generator:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      # Bind-mount: project data lives on the HOST at ./data, not inside the container.
      # Data persists across 'docker compose pull && docker compose up -d' updates
      # and across all container restarts. Never run 'docker compose down -v' — that
      # flag removes named volumes, though this bind mount is unaffected by it.
      - ./data:/app/data
    restart: unless-stopped
    labels:
      - "com.centurylabs.watchtower.scope=bulletin-generator"

  # Watchtower watches GHCR for new images and restarts the app container.
  # It is only reachable within the private Docker network — never exposed
  # externally — so the shared default token is safe for typical deployments.
  # Advanced users can override WATCHTOWER_TOKEN in .env.
  watchtower:
    image: containrrr/watchtower
    command: --http-api-update --scope bulletin-generator --cleanup
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN:-bulletin-updater}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
