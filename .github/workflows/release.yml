name: Release

# Triggered by pushing a version tag: git tag v1.09 && git push origin v1.09
on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Build and push Docker image to GHCR ─────────────────────────────
  docker:
    name: Docker image → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ github.ref_name }}

  # ── Job 2: Build, sign, notarize macOS .app and attach to GitHub Release ───
  desktop-macos:
    name: macOS desktop build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller and dependencies
        run: pip install "pyinstaller==6.19.0" rumps certifi

      - name: Write desktop_config.py from secrets
        env:
          PCO_CLIENT_ID:        ${{ secrets.PCO_CLIENT_ID }}
          PCO_CLIENT_SECRET:    ${{ secrets.PCO_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python - <<'PYEOF'
          import os
          lines = [
              'PCO_CLIENT_ID = "{}"\n'.format(os.environ.get("PCO_CLIENT_ID", "")),
              'PCO_CLIENT_SECRET = "{}"\n'.format(os.environ.get("PCO_CLIENT_SECRET", "")),
              'GOOGLE_CLIENT_ID = "{}"\n'.format(os.environ.get("GOOGLE_CLIENT_ID", "")),
              'GOOGLE_CLIENT_SECRET = "{}"\n'.format(os.environ.get("GOOGLE_CLIENT_SECRET", "")),
          ]
          with open("desktop_config.py", "w") as f:
              f.writelines(lines)
          print("desktop_config.py written.")
          PYEOF

      - name: Build with PyInstaller
        run: pyinstaller bulletin-generator.spec

      # ── Code signing ────────────────────────────────────────────────────────
      - name: Import certificate and sign the .app bundle
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain — keeps CI secrets off the login keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the Developer ID certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          # Import the Developer ID G2 intermediate CA so the full chain is
          # embedded in the signature (required for Apple notarization)
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Find the identity while the keychain is still unlocked in this shell
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with identity: $IDENTITY"

          APP="dist/Bulletin Generator.app"

          # Step 1: Sign every Mach-O binary individually (inside-out).
          # --deep is unreliable for propagating --options runtime to inner
          # binaries; Apple requires hardened runtime on EVERY binary.
          echo "=== Signing individual binaries ==="
          while IFS= read -r f; do
            echo "  signing: $f"
            codesign --force --timestamp --sign "$IDENTITY" \
              --options runtime \
              --entitlements entitlements.plist "$f"
          done < <(find -L "$APP" -type f -exec sh -c 'file "$1" | grep -qE "Mach-O"' _ {} \; -print)

          # Step 2: Sign .framework bundles (creates CodeResources that hash
          # the already-signed inner binaries)
          echo "=== Signing frameworks ==="
          while IFS= read -r fw; do
            echo "  framework: $fw"
            codesign --force --timestamp --sign "$IDENTITY" \
              --options runtime \
              --entitlements entitlements.plist "$fw"
          done < <(find "$APP" -name "*.framework" -type d | sort -r)

          # Step 3: Sign the .app bundle itself (without --deep)
          echo "=== Signing app bundle ==="
          codesign --force --timestamp --sign "$IDENTITY" \
            --options runtime \
            --entitlements entitlements.plist "$APP"

          # Verify
          echo "=== Verification ==="
          codesign --verify --deep --strict --verbose=2 "$APP"

          # Diagnostic: check the 5 paths Apple has been complaining about
          echo "=== Diagnostic: individual binary signatures ==="
          for p in \
            "$APP/Contents/MacOS/BulletinGenerator" \
            "$APP/Contents/Resources/Python" \
            "$APP/Contents/Resources/Python.framework/Python" \
            "$APP/Contents/Frameworks/Python" \
            "$APP/Contents/Frameworks/Python.framework/Python"; do
            echo "--- $p ---"
            ls -la "$p" 2>&1 || true
            codesign -dvv "$p" 2>&1 || true
          done

      # ── Notarization ────────────────────────────────────────────────────────
      - name: Zip the signed .app for notarization
        run: |
          # Use ditto instead of zip — preserves macOS extended attributes,
          # resource forks, and symlinks correctly (required for code signatures)
          ditto -c -k --keepParent "dist/Bulletin Generator.app" \
            "dist/BulletinGenerator-macos-${{ github.ref_name }}.zip"

      - name: Notarize with Apple
        env:
          APPLE_NOTARY_KEY_ID:      ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY_ISSUER:  ${{ secrets.APPLE_NOTARY_KEY_ISSUER }}
          APPLE_NOTARY_KEY_CONTENT: ${{ secrets.APPLE_NOTARY_KEY_CONTENT }}
        run: |
          # Write the App Store Connect API key to a temp file
          KEY_PATH="$RUNNER_TEMP/notary-key.p8"
          echo "$APPLE_NOTARY_KEY_CONTENT" > "$KEY_PATH"

          NOTARY_OUTPUT=$(xcrun notarytool submit \
            "dist/BulletinGenerator-macos-${{ github.ref_name }}.zip" \
            --key        "$KEY_PATH" \
            --key-id     "$APPLE_NOTARY_KEY_ID" \
            --issuer     "$APPLE_NOTARY_KEY_ISSUER" \
            --wait \
            --timeout 15m 2>&1)
          echo "$NOTARY_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARY_OUTPUT" | grep '  id:' | head -1 | awk '{print $2}')
          STATUS=$(echo "$NOTARY_OUTPUT" | grep 'status:' | tail -1 | awk '{print $2}')
          echo "Submission ID: $SUBMISSION_ID"
          echo "Status: $STATUS"

          if [ "$STATUS" != "Accepted" ]; then
            echo "--- Notarization rejection log ---"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key    "$KEY_PATH" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_KEY_ISSUER" || true
            exit 1
          fi

      - name: Staple notarization ticket to the .app
        run: |
          xcrun stapler staple "dist/Bulletin Generator.app"
          xcrun stapler validate "dist/Bulletin Generator.app"

      - name: Re-zip the stapled .app
        run: |
          rm "dist/BulletinGenerator-macos-${{ github.ref_name }}.zip"
          ditto -c -k --keepParent "dist/Bulletin Generator.app" \
            "dist/BulletinGenerator-macos-${{ github.ref_name }}.zip"

      - name: Create GitHub Release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BulletinGenerator-macos-${{ github.ref_name }}.zip
          generate_release_notes: true
